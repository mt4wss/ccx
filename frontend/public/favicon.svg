<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- 专属流光渐变线 -->
    <linearGradient id="fav-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- 高斯发光滤镜 -->
    <filter id="fav-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 外部数据循环轨道 -->
  <circle
    cx="50"
    cy="50"
    r="44"
    stroke="url(#fav-logo-grad)"
    stroke-width="1.8"
    stroke-dasharray="12 8 4 8"
    opacity="0.4"
  />

  <!-- 2. "C" 字型分流弧线 -->
  <path
    d="M 32 24 C 18 32, 18 68, 32 76"
    stroke="url(#fav-logo-grad)"
    stroke-width="5.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- 3. "X" 字型路由交叉射束 -->
  <path
    d="M 72 24 L 50 50 L 72 76"
    stroke="url(#fav-logo-grad)"
    stroke-width="5.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- 4. 反向贯穿路径 -->
  <path
    d="M 50 50 L 36 36"
    stroke="url(#fav-logo-grad)"
    stroke-width="5.5"
    stroke-linecap="round"
    opacity="0.9"
  />
  <path
    d="M 50 50 L 36 64"
    stroke="url(#fav-logo-grad)"
    stroke-width="5.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- 5. 核心路由核 -->
  <g filter="url(#fav-glow)">
    <circle
      cx="50"
      cy="50"
      r="9"
      fill="url(#fav-logo-grad)"
      opacity="0.5"
    />
    <circle
      cx="50"
      cy="50"
      r="5.5"
      fill="#ffffff"
    />
  </g>
</svg>
